name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go build ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go test ./... -v

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - run: go test ./internal/provider/ -v -tags=acceptance -timeout 120m
        env:
          TF_ACC: "1"
          SPORK_API_KEY: ${{ secrets.SPORK_API_KEY }}
